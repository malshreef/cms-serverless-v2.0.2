AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: S7abt Admin Dashboard - Phase 3 CMS with Articles CRUD

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  DatabaseSecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing database credentials

  UserPoolArn:
    Type: String
    Description: ARN of existing Cognito User Pool

  UserPoolId:
    Type: String
    Description: ID of existing Cognito User Pool (e.g., me-south-1_XXXXXXX)

  MediaBucketName:
    Type: String
    Description: Name of existing S3 media bucket

  VpcSecurityGroupIds:
    Type: CommaDelimitedList
    Description: Comma-separated list of security group IDs for Lambda functions (must allow outbound to RDS on port 3306)

  VpcSubnetIds:
    Type: CommaDelimitedList
    Description: Comma-separated list of VPC subnet IDs for Lambda functions (must have access to RDS)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    VpcConfig:
      SubnetIds: !Ref VpcSubnetIds
      SecurityGroupIds: !Ref VpcSecurityGroupIds
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DB_SECRET_ARN: !Ref DatabaseSecretArn
        DB_SECRET_NAME: !Ref DatabaseSecretArn
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1
    Tags:
      Project: S7abt
      Environment: !Ref Environment
      Phase: "3"

Resources:
  # ========================================
  # IAM Role for Lambda Functions
  # ========================================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Ref DatabaseSecretArn
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                Resource: !Sub 'arn:aws:s3:::${MediaBucketName}/*'
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cognito-idp:AdminCreateUser'
                  - 'cognito-idp:AdminSetUserPassword'
                  - 'cognito-idp:AdminUpdateUserAttributes'
                  - 'cognito-idp:AdminDeleteUser'
                  - 'cognito-idp:AdminEnableUser'
                  - 'cognito-idp:AdminDisableUser'
                  - 'cognito-idp:AdminGetUser'
                  - 'cognito-idp:ListUsers'
                Resource: !Ref UserPoolArn

  # ========================================
  # Lambda Functions - Authentication
  # ========================================

  GetCurrentUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub s7abt-admin-get-current-user-${Environment}
      CodeUri: ../backend/auth/
      Handler: getCurrentUser.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/auth/me
            Method: get

  GetDashboardStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub s7abt-admin-dashboard-stats-${Environment}
      CodeUri: ../backend/auth/
      Handler: getDashboardStats.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/dashboard/stats
            Method: get

  GetInsightsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub s7abt-admin-get-insights-${Environment}
      CodeUri: ../backend/analytics/
      Handler: getInsights.handler
      Description: Get analytics and insights data for dashboard
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/analytics/insights
            Method: get

  # ========================================
  # Lambda Functions - Articles CRUD
  # ========================================

  ListArticlesFunction:
