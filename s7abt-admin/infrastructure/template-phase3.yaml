  # ========================================

  ListTagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub s7abt-admin-list-tags-${Environment}
      CodeUri: ../backend/tags/
      Handler: list.handler
      Role: !GetAtt LambdaExecutionRole.Arn
